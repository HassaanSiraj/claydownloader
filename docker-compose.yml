services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data

  worker:
    build: .
    restart: unless-stopped
    command: celery -A app.celery_app worker --loglevel=info --concurrency=2
    environment:
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./downloads:/srv/downloads
    depends_on:
      - redis

  api:
    build: .
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./downloads:/srv/downloads
    ports:
      - "8000:8000"
    depends_on:
      - redis

volumes:
  redis-data:
